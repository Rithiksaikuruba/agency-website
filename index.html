<!doctype html>
<!-- ✅ lang attribute: critical for Google language targeting & screen readers -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- ✅ IE compatibility shim — prevents IE from rendering in quirks mode -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Referrer policy: controls how much referrer info is passed on outbound links -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ✅ Prevents iOS from auto-linking phone numbers / emails as tap targets -->
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />

    <!-- ✅ Content rating — used by some parental filters & ad networks -->
    <meta name="rating" content="general" />

    <!-- ============================================================
         PRIMARY SEO TAGS
    ============================================================ -->

    <!--
      ✅ Title tag best practices:
         • Primary keyword near the start
         • Brand name at the end (separated by |)
         • Under 60 characters to avoid truncation in SERPs
         • Exact char count: ~57 chars ✓
    -->
    <title>Website Design Agency for Startups — AI & Automation | Stryvenix</title>

    <!--
      ✅ Meta description best practices:
         • 150–160 characters (this is ~158 chars) ✓
         • Includes a clear CTA ("Get started today")
         • Mentions geo-targets (US, UK, India) for local relevance
         • Includes primary keywords naturally
    -->
    <meta
      name="description"
      content="Stryvenix is a website design agency for startups in India, US & UK. We build high-converting websites, AI chatbots & automation systems. Launch in 2–4 weeks. Book a free call."
    />

    <!--
      ✅ Keywords: While Google ignores this, Bing still uses it.
         Keep them tightly relevant; avoid stuffing.
    -->
    <meta
      name="keywords"
      content="website design agency, AI automation agency, business automation services, web development company, AI solutions for business, workflow automation, Stryvenix, website building agency"
    />

    <meta name="author" content="Stryvenix" />

    <!--
      ✅ Robots: max-snippet, max-image-preview, max-video-preview
         allow Google to show rich previews in search results.
    -->
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />

    <!-- ✅ Canonical URL: prevents duplicate content issues -->
    <link rel="canonical" href="https://www.stryvenix.com/" />

    <!--
      FIX ❌→✅: Removed non-standard <link rel="sitemap"> tag.
      The sitemap should be declared in robots.txt like:
        Sitemap: https://www.stryvenix.com/sitemap.xml
      and submitted via Google Search Console.
      The <link> tag here is ignored by all major crawlers.
    -->

    <!-- ============================================================
         OPEN GRAPH (Facebook, LinkedIn, WhatsApp previews)
    ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.stryvenix.com/" />
    <meta property="og:site_name" content="Stryvenix" />
    <meta property="og:title" content="Stryvenix | Website Design, AI & Automation Agency" />
    <meta
      property="og:description"
      content="Stryvenix builds high-converting websites, AI-powered tools, and automation workflows for businesses in the US, UK & India. Let's build something extraordinary."
    />
    <!-- 1200×630px is the recommended OG image size -->
    <meta property="og:image" content="https://www.stryvenix.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Stryvenix — Website Design, AI & Automation Agency" />
    <meta property="og:locale" content="en_US" />
    <!-- ✅ Alternate locales for multi-region targeting -->
    <meta property="og:locale:alternate" content="en_GB" />
    <meta property="og:locale:alternate" content="en_IN" />

    <!-- ============================================================
         TWITTER / X CARD
    ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@stryvenix" />
    <meta name="twitter:creator" content="@stryvenix" />
    <meta name="twitter:title" content="Stryvenix | Website Design, AI & Automation Agency" />
    <meta
      name="twitter:description"
      content="We build stunning websites, AI solutions & automation workflows for modern businesses in the US, UK & India. Let's build something extraordinary."
    />
    <meta name="twitter:image" content="https://www.stryvenix.com/og-image.png" />
    <meta name="twitter:image:alt" content="Stryvenix — Website Design, AI & Automation Agency" />

    <!-- ============================================================
         FAVICON, APP ICONS & PWA

         FIX ❌→✅: All favicon hrefs previously pointed to
         /src/assets/Navicon.png — that path only exists in Vite's
         dev server. After `vite build`, the /src/ tree is NOT copied
         to dist. Place your icons in /public/ so Vite copies them as-is.

         Recommended files to add to /public/:
           /public/favicon-32x32.png
           /public/favicon-16x16.png
           /public/apple-touch-icon.png   (180×180)
           /public/safari-pinned-tab.svg
           /public/site.webmanifest
           /public/browserconfig.xml
           /public/og-image.png           (1200×630)
    ============================================================ -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#0a0a0a" />

    <!-- ✅ PWA manifest + theme colors for Android Chrome & iOS Safari -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stryvenix" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ============================================================
         GEO & LANGUAGE TARGETING

         FIX ❌→✅: geo.region was set to IN only.
         Since you target 3 regions, keep IN as your primary (where
         the business is registered) but ensure hreflang covers all.
         geo.* meta tags are Bing/Yahoo signals — Google uses hreflang.
    ============================================================ -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <link rel="alternate" hreflang="en" href="https://www.stryvenix.com/" />
    <link rel="alternate" hreflang="en-US" href="https://www.stryvenix.com/" />
    <link rel="alternate" hreflang="en-GB" href="https://www.stryvenix.com/" />
    <link rel="alternate" hreflang="en-IN" href="https://www.stryvenix.com/" />
    <link rel="alternate" hreflang="x-default" href="https://www.stryvenix.com/" />

    <!-- ============================================================
         PERFORMANCE: Preconnect, DNS-prefetch & Preload
    ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!--
      ✅ Preload your actual font files once you know the Vite-hashed filenames.
         Run `vite build` then check dist/assets/ for the .woff2 filenames.
         Example:
    -->
    <!-- <link rel="preload" as="font" type="font/woff2" href="/assets/YourFont-Cv3xABcd.woff2" crossorigin /> -->

    <!-- ✅ Preload LCP image (hero image / OG image if shown above fold) -->
    <!-- <link rel="preload" as="image" href="/og-image.png" /> -->

    <!-- ============================================================
         GOOGLE TAG MANAGER
         Place GTM snippet here (in <head>) once you have a container ID.
         Replace GTM-XXXXXXX with your actual container ID.
    ============================================================ -->

    })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
    -->
